AWSTemplateFormatVersion: '2010-09-09'
Description: 'CPU Stress Test with Gradual Load Increase'

Parameters:
  TargetInstanceId:
    Type: String
    Description: ID of the existing EC2 instance to run tests on
  StepInterval:
    Type: Number
    Default: 30
    Description: Seconds between each 10% load increase
  StressNGCPUs:
    Type: Number
    Default: 96
    Description: Maximum number of CPUs to stress

Resources:
  StressTestDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'CPU monitoring with gradual load increase'
        parameters:
          stepInterval:
            type: String
            default: '30'
          cpus:
            type: String
            default: '96'
          instanceId:
            type: String
            description: "EC2 Instance ID"
        mainSteps:
          - action: aws:runShellScript
            name: MonitorCPU
            inputs:
              runCommand:
                - |
                  #!/bin/bash
                  set -ex

                  echo "Starting monitoring for instance {{ instanceId }}"

                  # Function to count stress-ng processes
                  count_stress_processes() {
                    ps aux | grep '[s]tress-ng' | grep -v grep | wc -l
                  }

                  # Function to start stress-ng with specified number of CPUs
                  start_stress() {
                    local cpus=$1
                    stress-ng --cpu $cpus --cpu-method all &
                    echo $!
                  }

                  # Calculate CPUs for each 10% step
                  MAX_CPUS={{ cpus }}
                  # STEP_CPUS=$((MAX_CPUS / 10))

                  # Start turbostat monitoring
                  echo "Starting turbostat..."
                  sudo turbostat --show Avg_MHz,Busy%,Bzy_MHz --interval 1 | \
                  while read -r line; do
                      if [[ $line =~ ^[0-9] ]]; then
                          avg_mhz=$(echo "$line" | awk '{print $1}')
                          busy=$(echo "$line" | awk '{print $2}')
                          bzy_mhz=$(echo "$line" | awk '{print $3}')
                          hogs=$(count_stress_processes)
                          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                          echo "Sending metrics at $timestamp: Avg_MHz=$avg_mhz, Busy%=$busy, Bzy_MHz=$bzy_mhz, Hogs=$hogs"

                          aws cloudwatch put-metric-data \
                              --namespace "CPUStressTest" \
                              --metric-data "[
                                  {
                                      \"MetricName\": \"AverageMHz\",
                                      \"Value\": $avg_mhz,
                                      \"Unit\": \"None\",
                                      \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                      \"Timestamp\": \"$timestamp\"
                                  },
                                  {
                                      \"MetricName\": \"CPUBusy\",
                                      \"Value\": $busy,
                                      \"Unit\": \"Percent\",
                                      \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                      \"Timestamp\": \"$timestamp\"
                                  },
                                  {
                                      \"MetricName\": \"CPUFrequency\",
                                      \"Value\": $bzy_mhz,
                                      \"Unit\": \"None\",
                                      \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                      \"Timestamp\": \"$timestamp\"
                                  },
                                  {
                                      \"MetricName\": \"ActiveCPUHogs\",
                                      \"Value\": $hogs,
                                      \"Unit\": \"Count\",
                                      \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                      \"Timestamp\": \"$timestamp\"
                                  }
                              ]"
                      fi
                  done &
                  TURBOSTAT_PID=$!

                  # Gradually increase load
                  for i in $(seq 1 10); do
                      CURRENT_CPUS=$(((MAX_CPUS * i) / 10))
                      echo "Starting stress-ng with $CURRENT_CPUS CPUs (${i}0% load)"

                      if [ $i -gt 1 ]; then
                          # Stop previous stress-ng processes
                          pkill stress-ng || true
                          sleep 1
                      fi

                      # Start new stress-ng processes
                      start_stress $CURRENT_CPUS

                      # Wait for step interval
                      sleep {{ stepInterval }}
                  done

                  # Keep the last stress level for a while
                  sleep {{ stepInterval }}

                  # Cleanup
                  pkill stress-ng || true
                  kill $TURBOSTAT_PID || true

                  echo "Monitoring complete"

  RunTest:
    Type: AWS::SSM::Association
    Properties:
      Name: !Ref StressTestDocument
      Targets:
        - Key: InstanceIds
          Values:
            - !Ref TargetInstanceId
      Parameters:
        stepInterval:
          - !Ref StepInterval
        cpus:
          - !Ref StressNGCPUs
        instanceId:
          - !Ref TargetInstanceId

  CPUDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["CPUStressTest", "CPUFrequency", "InstanceId", "${TargetInstanceId}", {"label": "Bzy_MHz", "yAxis": "right"}],
                  [".", "AverageMHz", ".", ".", {"label": "Avg_MHz", "yAxis": "left"}],
                  [".", "CPUBusy", ".", ".", {"label": "CPU%", "color": "#2ca02c"}]
                ],
                "period": 1,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "CPU Metrics During Gradual Load Increase",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 1000,
                    "label": "Avg MHz"
                  },
                  "right": {
                    "min": 2000,
                    "max": 4000,
                    "label": "Bzy MHz"
                  }
                }
              }
            },
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["CPUStressTest", "ActiveCPUHogs", "InstanceId", "${TargetInstanceId}", {"label": "Active CPU Hogs", "yAxis": "right"}],
                  [".", "AverageMHz", ".", ".", {"label": "Avg_MHz", "yAxis": "left"}]
                ],
                "period": 1,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "CPU Hogs vs Average Frequency",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 1000,
                    "label": "Avg MHz"
                  },
                  "right": {
                    "min": 0,
                    "max": 100,
                    "label": "Number of Hogs"
                  }
                }
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL for the CPU Monitoring Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-monitoring
