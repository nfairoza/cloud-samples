AWSTemplateFormatVersion: '2010-09-09'
Description: 'CPU Stress Test with Gradual Load Increase'

Parameters:
  TargetInstanceId:
    Type: String
    Description: ID of the existing EC2 instance to run tests on
  StepInterval:
    Type: Number
    Default: 30
    Description: Seconds between each 10% load increase
  StressNGCPUs:
    Type: Number
    Default: 96
    Description: Maximum number of CPUs to stress

Resources:
  StressTestDocument:
    Type: AWS::SSM::Document
    Properties:
      DocumentType: Command
      Content:
        schemaVersion: '2.2'
        description: 'CPU monitoring with gradual load increase and 30s aggregation'
        parameters:
          stepInterval:
            type: String
            default: '30'
          cpus:
            type: String
            default: '96'
          instanceId:
            type: String
            description: "EC2 Instance ID"
        mainSteps:
          - action: aws:runShellScript
            name: MonitorCPU
            inputs:
              runCommand:
                - |
                  #!/bin/bash
                  set -ex

                  echo "Starting monitoring for instance {{ instanceId }}"

                  # Function to count stress-ng processes
                  count_stress_processes() {
                    ps aux | grep '[s]tress-ng' | grep -v grep | wc -l
                  }

                  # Function to start stress-ng with specified number of CPUs
                  start_stress() {
                    local cpus=$1
                    for ((i=0; i<cpus; i++)); do
                        taskset -c $i stress-ng --cpu 1 --cpu-method all \
                            --cpu-ops 99999999 \
                            --cpu-load 100 \
                            --sched fifo \
                            --sched-prio 95 \
                            --metrics-brief \
                            --abort \
                            --aggressive &
                    done
                  }

                  # Arrays to store metrics for aggregation
                  declare -a avg_mhz_array=()
                  declare -a busy_array=()
                  declare -a bzy_mhz_array=()
                  declare -a hogs_array=()

                  # Function to calculate average
                  calculate_average() {
                    local array=("$@")
                    local sum=0
                    local count=${#array[@]}
                    for value in "${array[@]}"; do
                      sum=$(echo "$sum + $value" | bc -l)
                    done
                    echo "scale=2; $sum / $count" | bc -l
                  }

                  # Function to send aggregated metrics
                  send_aggregated_metrics() {
                    local avg_mhz=$(calculate_average "${avg_mhz_array[@]}")
                    local busy=$(calculate_average "${busy_array[@]}")
                    local bzy_mhz=$(calculate_average "${bzy_mhz_array[@]}")
                    local hogs=$(calculate_average "${hogs_array[@]}")
                    local timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

                    echo "Sending aggregated metrics at $timestamp"
                    echo "Avg_MHz=$avg_mhz, Busy%=$busy, Bzy_MHz=$bzy_mhz, Hogs=$hogs"

                    aws cloudwatch put-metric-data \
                        --storage-resolution 30 \
                        --namespace "CPUStressTest" \
                        --metric-data "[
                            {
                                \"MetricName\": \"AverageMHz\",
                                \"Value\": $avg_mhz,
                                \"Unit\": \"None\",
                                \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                \"Timestamp\": \"$timestamp\"
                            },
                            {
                                \"MetricName\": \"Busy%\",
                                \"Value\": $busy,
                                \"Unit\": \"Percent\",
                                \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                \"Timestamp\": \"$timestamp\"
                            },
                            {
                                \"MetricName\": \"CPUFrequency\",
                                \"Value\": $bzy_mhz,
                                \"Unit\": \"None\",
                                \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                \"Timestamp\": \"$timestamp\"
                            },
                            {
                                \"MetricName\": \"ActiveCPUHogs\",
                                \"Value\": $hogs,
                                \"Unit\": \"Count\",
                                \"Dimensions\": [{\"Name\": \"InstanceId\", \"Value\": \"{{ instanceId }}\"}],
                                \"Timestamp\": \"$timestamp\"
                            }
                        ]"

                    # Clear arrays after sending
                    avg_mhz_array=()
                    busy_array=()
                    bzy_mhz_array=()
                    hogs_array=()
                  }

                  # Calculate CPUs for each 10% step
                  MAX_CPUS={{ cpus }}

                  # Start turbostat monitoring with 1-second interval
                  echo "Starting turbostat..."
                  sudo turbostat --show Avg_MHz,Busy%,Bzy_MHz --interval 1 | \
                  while read -r line; do
                      if [[ $line =~ ^[0-9] ]]; then
                          # Add metrics to arrays
                          avg_mhz_array+=("$(echo "$line" | awk '{print $1}')")
                          busy_array+=("$(echo "$line" | awk '{print $2}')")
                          bzy_mhz_array+=("$(echo "$line" | awk '{print $3}')")
                          hogs_array+=("$(count_stress_processes)")

                          # If we have 30 seconds worth of data, send aggregated metrics
                          if [ ${#avg_mhz_array[@]} -ge 30 ]; then
                              send_aggregated_metrics
                          fi
                      fi
                  done &
                  TURBOSTAT_PID=$!

                  # [Rest of the stress test logic remains the same]

  # Update dashboard to use 30-second period
  CPUDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-monitoring
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["CPUStressTest", "CPUFrequency", "InstanceId", "${TargetInstanceId}", {"label": "Bzy_MHz", "yAxis": "left", "period": 30}],
                  [".", "AverageMHz", ".", ".", {"label": "Avg_MHz", "yAxis": "left", "period": 30}],
                  [".", "Busy%", ".", ".", {"label": "Busy%", "color": "#2ca02c", "yAxis": "right", "period": 30}]
                ],
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "CPU Metrics During Gradual Load Increase",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 4000,
                    "label": "MHz"
                  },
                  "right": {
                    "min": 0,
                    "max": 100,
                    "label": "Busy %"
                  }
                }
              }
            },
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["CPUStressTest", "ActiveCPUHogs", "InstanceId", "${TargetInstanceId}", {"label": "Active CPU Hogs", "yAxis": "right", "period": 30}],
                  [".", "AverageMHz", ".", ".", {"label": "Avg_MHz", "yAxis": "left", "period": 30}]
                ],
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "CPU Hogs vs Average Frequency",
                "view": "timeSeries",
                "yAxis": {
                  "left": {
                    "min": 0,
                    "max": 4000,
                    "label": "MHz"
                  },
                  "right": {
                    "min": 0,
                    "max": 150,
                    "label": "Number of CPU Hogs"
                  }
                }
              }
            }
          ]
        }

Outputs:
  DashboardURL:
    Description: URL for the CPU Monitoring Dashboard
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${AWS::StackName}-monitoring
